; ============================================================
; PHP-FPM pool: workers berjalan sebagai www (uid 1000)
; Container boleh root — entrypoint.sh fix perms dulu baru
; exec php-fpm. FPM akan fork workers sebagai user ini.
; ============================================================

[www]
user  = www
group = www

listen = 0.0.0.0:9000
listen.owner = www
listen.group = www
listen.mode  = 0660

pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests      = 500

; Log worker stdout/stderr ke FPM error log
catch_workers_output = yes

; HARUS no — supaya PHP workers bisa baca APP_KEY, DB_*, dll dari env
clear_env = no
