services:

  # ──────────────────────────────────────────────────────────
  # 1. Laravel PHP-FPM App
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: cctv-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - app_profil:/var/www/html/public/assets/img/profil
    networks:
      - cctv_net
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # 2. Nginx — reverse proxy ke PHP-FPM (app:9000)
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cctv-nginx
    restart: unless-stopped
    ports:
      - "8091:8091"
      # - "443:443"    # aktifkan setelah SSL/certbot
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_profil:/var/www/html/public/assets/img/profil:ro
    networks:
      - cctv_net
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 3. EZVIZ Scraper (Python / Selenium / Chrome)
  #    Hanya expose ke internal network — tidak ke publik
  # ──────────────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: tools/Dockerfile
    container_name: cctv-scraper
    restart: unless-stopped
    shm_size: '512mb'    # Chrome butuh /dev/shm cukup besar, default 64MB sering crash
    # seccomp:unconfined diperlukan karena Docker default seccomp memblokir syscall
    # yang dibutuhkan Chrome modern (clone3, dll) → menyebabkan "Chrome instance exited"
    security_opt:
      - seccomp:unconfined
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "5055"
      CHROME_BIN: "/usr/bin/google-chrome"
      CHROMEDRIVER_PATH: "/usr/local/bin/chromedriver"
      WDM_OFFLINE: "true"
    expose:
      - "5055"
    networks:
      - cctv_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ──────────────────────────────────────────────────────────
volumes:
  app_storage:
  app_profil:

networks:
  cctv_net:
    driver: bridge
