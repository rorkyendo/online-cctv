server {
    listen 8091;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Max upload sesuai php-prod.ini
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin"  always;
    # CSP di-handle oleh aaPanel nginx (outer layer) — jangan set di sini supaya tidak duplikat

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Static assets — cache aggressif
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel entrypoint
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # aPanel terminate SSL lalu forward ke sini via HTTP.
        # Kasih tahu PHP bahwa request aslinya HTTPS supaya Laravel
        # generate asset/URL pakai https:// (cegah mixed-content).
        fastcgi_param  HTTPS                    on;
        fastcgi_param  HTTP_X_FORWARDED_PROTO   https;
        fastcgi_param  HTTP_X_FORWARDED_FOR     $http_x_forwarded_for;

        fastcgi_read_timeout 60;
        fastcgi_buffer_size  16k;
        fastcgi_buffers      4 16k;
    }

    # Blokir akses ke file sensitif
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    location ~ ^/(artisan|composer\.(json|lock)|package\.json|Dockerfile) {
        deny all;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
